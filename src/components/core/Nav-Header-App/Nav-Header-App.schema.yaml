# Nav-Header-App Component Schema
#
# Stemma System: Navigation Family
# Component Type: Semantic (inherits Nav-Header-Base)
#
# Permissive app-level header scaffold. Product-defined content.
# Architectural foundation — safe area, landmark, tokens inherited.
# Readiness: scaffold (architecture in place, product content TBD).

name: Nav-Header-App
type: semantic
family: Navigation
version: "1.0.0"
inherits: Nav-Header-Base
readiness:
  web:
    reviewed: true
  ios:
    reviewed: true
  android:
    reviewed: true

description: |
  App-level header for root destination screens. Inherits safe area,
  background, layout, and landmark semantics from Nav-Header-Base.
  Exposes three CSS custom properties for product-controlled theming
  (--nav-bg-override, --nav-glow-color, --nav-border-color) and renders
  an intrinsic underglow effect. Content is product-defined via slots.

behaviors:
  - renderable
  - accessible

properties:
  leadingContent:
    type: "React.ReactNode"
    required: false
    description: Product-defined leading content (logo, menu, etc.)

  centerContent:
    type: "React.ReactNode"
    required: false
    description: Product-defined center content (title, logo, search, etc.)

  trailingContent:
    type: "React.ReactNode"
    required: false
    description: Product-defined trailing content (actions, profile, etc.)

  appearance:
    type: "'opaque' | 'translucent'"
    required: false
    default: "'opaque'"
    description: Inherited from Nav-Header-Base.

  showSeparator:
    type: boolean
    required: false
    default: "true"
    description: Inherited from Nav-Header-Base.

  testID:
    type: string
    required: false

customProperties:
  --nav-bg-override:
    type: string
    required: false
    description: |
      Overrides the nav background color. Product sets this via JS during
      scroll transitions. When not set, defaults to color.structure.canvas.
    default: "color.structure.canvas (inherited)"

  --nav-glow-color:
    type: string
    required: false
    description: |
      Overrides the underglow color. Expects an rgba value with opacity
      pre-baked (e.g., rgba(255, 42, 109, 0.4)). When not set, defaults
      to glow.neonGreen at glowOpacity300.
    default: "rgba(0, 204, 110, 0.4)"

  --nav-border-color:
    type: string
    required: false
    description: |
      Overrides the separator border color. Product sets this via JS during
      scroll transitions. When not set, defaults to green400.
    default: "green400"

tokens:
  component:
    - navButton.padding.vertical
    - navHeader.padding.inline

composition:
  internal:
    - component: Nav-Header-Base
      role: Structural primitive
      required: true

platforms:
  - web
  - ios
  - android

accessibility:
  landmark: true
  landmark_role: banner
  heading: false
