purpose: "Collect a password with masked input, visibility toggle, and strength validation feedback."

usage:
  when_to_use:
    - "Password fields in login or registration forms"
    - "Any secret input that needs masking and optional reveal"
  when_not_to_use:
    - "Non-secret text inputs — use Input-Text-Base"
    - "PIN or numeric code inputs"

contexts:
  - "forms"
  - "onboarding-flows"
  - "settings-screens"

alternatives:
  - component: Input-Text-Email
    reason: "When email address collection"
  - component: Input-Text-PhoneNumber
    reason: "When phone number collection"
  - component: Input-Text-Base
    reason: "When generic text input"
  - component: Input-Checkbox-Legal
    reason: "When terms of service acceptance"
  - component: Input-Checkbox-Base
    reason: "When generic binary selection"
  - component: Input-Radio-Base
    reason: "When standalone radio (rare)"
