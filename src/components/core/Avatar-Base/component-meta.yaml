purpose: "Display a user or entity avatar with image, initials fallback, and shape differentiation between human and AI agent entities."

usage:
  when_to_use:
    - "Showing a user profile image in headers, comments, or contact lists"
    - "Displaying an AI agent identity with distinct hexagonal shape"
    - "Showing initials when no profile image is available"
  when_not_to_use:
    - "Decorative icons without identity meaning — use Icon-Base"
    - "Logos or brand marks that aren't user/entity avatars"

contexts:
  - "profile-sections"
  - "content-feeds"
  - "list-items"
  - "dashboards"

alternatives:
  - component: Icon-Base
    reason: "When displaying a generic icon rather than a user or entity identity"
