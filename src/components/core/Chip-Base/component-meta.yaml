purpose: "Provide a compact interactive element for selections, filters, or actions in horizontal groups."

usage:
  when_to_use:
    - "General interactive chip"
    - "Single-select choice"
  when_not_to_use:
    - "Multi-select filter — use Chip-Filter"
    - "Tag input field — use Chip-Input"
    - "Display-only indicators are needed (use Badge instead)"
    - "Primary actions are needed (use Button instead)"
    - "Navigation is needed (use Tab or Link instead)"
    - "The element should not be interactive"

contexts:
  - "filter-bars"
  - "forms"

alternatives:
  - component: Chip-Filter
    reason: "When the chip toggles a content filter on/off"
  - component: Chip-Input
    reason: "When the chip represents a dismissible user-entered value"
  - component: Badge-Label-Base
    reason: "When the element is non-interactive and display-only"
