
<canvas id="c" style="display:block;width:100%;height:720px;background:#fff;cursor:default;"></canvas>
<div id="tip" style="position:fixed;pointer-events:none;display:none;background:rgba(255,255,255,0.97);border:1.5px solid #ff2d8f;border-radius:2px;padding:6px 11px;font-family:ui-monospace,monospace;font-size:11px;color:#111;z-index:99;max-width:260px;line-height:1.6;letter-spacing:0.01em;"></div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const tip=document.getElementById('tip');
const dpr=window.devicePixelRatio||1;

function resize(){
  canvas.width=canvas.offsetWidth*dpr;
  canvas.height=canvas.offsetHeight*dpr;
  ctx.scale(dpr,dpr);
}
resize();
window.addEventListener('resize',()=>{resize();});

const W=()=>canvas.offsetWidth, H=()=>canvas.offsetHeight;
const CX=()=>W()/2, CY=()=>H()/2;

let mx=-999, my=-999;
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mx=e.clientX-r.left; my=e.clientY-r.top;
  tip.style.left=(e.clientX+14)+'px';
  tip.style.top=(e.clientY-8)+'px';
});
canvas.addEventListener('mouseleave',()=>{mx=-999;my=-999;tip.style.display='none';});

// ── Palette ───────────────────────────────────────────────────────
const PAL={
  root:'#ff2d8f',mcp:'#00aabb',figma:'#e0006a',
  rosetta:'#1a5fff',stemma:'#7a00cc',release:'#009955',
  a2ui:'#009ab0',agent:'#cc0058',
};
function hexA(h,a){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function lerp(a,b,t){return a+(b-a)*t;}

// ── Data ──────────────────────────────────────────────────────────
const OUTER_GROUPS=[
  {id:'mcp',label:'MCP SERVERS',color:'#00aabb',nodes:[
    {id:'docs-mcp',   label:'Docs MCP',        ck:'mcp',   size:2,  desc:'82% token reduction · progressive disclosure architecture'},
    {id:'app-mcp',    label:'Application MCP', ck:'mcp',   size:2,  desc:'10 query tools · agent-driven component selection'},
    {id:'product-mcp',label:'Product MCP',     ck:'mcp',   size:2,  desc:'YAML context layer · directs agents toward build goals'},
    {id:'figma-mcp',  label:'Figma Console MCP',ck:'figma',size:1.5,desc:'Bidirectional Figma · token push to Variables + Styles'},
  ]},
  {id:'agents',label:'AGENTS',color:'#ff2d8f',nodes:[
    {id:'ada',     label:'Ada',     ck:'agent',size:1.2,desc:'Token development · Rosetta compliance'},
    {id:'lina',    label:'Lina',    ck:'agent',size:1.2,desc:'Component development · Stemma compliance'},
    {id:'thurgood',label:'Thurgood',ck:'agent',size:1.2,desc:'System auditing · governance · spec development'},
    {id:'leonardo',label:'Leonardo',ck:'agent',size:1.5,desc:'Product technical architecture · tech lead'},
    {id:'stacy',   label:'Stacy',   ck:'agent',size:1.2,desc:'Product governance · learning · lessons-learned'},
    {id:'sparky',  label:'Sparky',  ck:'agent',size:1.2,desc:'Web product development specialist'},
    {id:'kenya',   label:'Kenya',   ck:'agent',size:1.2,desc:'iOS product development specialist'},
    {id:'data',    label:'Data',    ck:'agent',size:1.2,desc:'Android product development specialist'},
  ]},
  {id:'systems',label:'SYSTEMS',color:'#7a00cc',nodes:[
    {id:'rosetta',label:'Rosetta',        ck:'rosetta',size:2.5,desc:'Mathematical token system · Web · iOS · Android'},
    {id:'stemma', label:'Stemma',         ck:'stemma', size:2.5,desc:'Component architecture · behavioral contracts'},
    {id:'release',label:'Release Manager',ck:'release',size:1.5,desc:'Semantic versioning · spec-based release analysis'},
    {id:'a2ui',   label:'A2UI',           ck:'a2ui',   size:1.5,desc:'Agent-to-UI · unambiguous token + contract language'},
  ]},
];

const INNER_GROUPS=[
  {id:'tokens',label:'TOKENS',color:'#1a5fff',nodes:[
    {id:'primitive',label:'Primitive tokens',  ck:'rosetta',size:1.2,desc:'space · color · typography · radius · shadow · motion'},
    {id:'semantic', label:'Semantic tokens',   ck:'rosetta',size:1.2,desc:'color.primary · space.inset.* · WCAG validator'},
    {id:'dtcg',     label:'DTCG output',       ck:'rosetta',size:1,  desc:'Design Token Community Group JSON'},
    {id:'figma-out',label:'Figma output',      ck:'figma',  size:1,  desc:'DesignTokens.figma.json · native Figma Variables'},
  ]},
  {id:'components',label:'COMPONENTS',color:'#9933ff',nodes:[
    {id:'prim-comp',label:'Primitive components',ck:'stemma',size:1.2,desc:'[Family]-[Type]-Base · cross-platform foundation'},
    {id:'sem-comp', label:'Semantic components', ck:'stemma',size:1.2,desc:'[Family]-[Type]-Variant · extended contracts'},
    {id:'contracts',label:'Contracts',           ck:'stemma',size:1.5,desc:'210 concepts · 10 categories · behavioral promises'},
  ]},
];

const nodeMap={};
OUTER_GROUPS.forEach(g=>g.nodes.forEach(n=>{n.ring='outer';n.group=g.id;nodeMap[n.id]=n;}));
INNER_GROUPS.forEach(g=>g.nodes.forEach(n=>{n.ring='inner';n.group=g.id;nodeMap[n.id]=n;}));

const CONNECTIONS=[
  ['docs-mcp','rosetta',0.8],['docs-mcp','stemma',0.5],
  ['docs-mcp','ada',0.7],['docs-mcp','lina',0.7],['docs-mcp','thurgood',0.7],
  ['app-mcp','stemma',0.9],['app-mcp','sparky',0.6],['app-mcp','leonardo',0.5],
  ['product-mcp','leonardo',0.8],['product-mcp','stacy',0.7],
  ['product-mcp','sparky',0.5],['product-mcp','kenya',0.5],['product-mcp','data',0.5],
  ['figma-mcp','dtcg',0.8],['figma-mcp','figma-out',0.9],
  ['rosetta','primitive',0.9],['rosetta','semantic',0.9],['rosetta','dtcg',0.7],['rosetta','figma-out',0.7],
  ['stemma','prim-comp',0.9],['stemma','sem-comp',0.9],['stemma','contracts',0.9],
  ['primitive','semantic',0.6],['semantic','dtcg',0.5],
  ['prim-comp','sem-comp',0.6],['contracts','sem-comp',0.5],
  ['ada','rosetta',0.7],['lina','stemma',0.7],
  ['a2ui','rosetta',0.5],['a2ui','app-mcp',0.5],
  ['release','docs-mcp',0.5],['semantic','prim-comp',0.4],
  ['stacy','product-mcp',0.5],['sparky','app-mcp',0.5],['leonardo','app-mcp',0.4],
];

const pulses=CONNECTIONS.map(()=>({t:Math.random(),speed:0.0018+Math.random()*0.002}));

// ── Rotation state ────────────────────────────────────────────────
let rotOffset=0;
let spinVelocity=0.0004;   // idle drift speed
let targetSpeed=0.0004;    // what we're easing toward
let dragging=false;
let lastDragAngle=0;

// Hover state
let hoveredNode=null;
let hoverFade=0; // 0=spinning freely, 1=fully paused at node

const IDLE_SPEED=0.0004;
const HOVER_DECEL=0.07;  // easing factor toward zero
const RESUME_ACCEL=0.03; // easing factor back to idle

// ── Drag ──────────────────────────────────────────────────────────
canvas.addEventListener('mousedown',e=>{
  const r=canvas.getBoundingClientRect();
  const lx=e.clientX-r.left, ly=e.clientY-r.top;
  const rootR=Math.min(W(),H())*0.075*0.75;
  if(Math.hypot(lx-CX(),ly-CY())<rootR+8){
    dragging=true;
    lastDragAngle=Math.atan2(ly-CY(),lx-CX());
    canvas.style.cursor='grabbing';
  }
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const r=canvas.getBoundingClientRect();
  const lx=e.clientX-r.left, ly=e.clientY-r.top;
  const angle=Math.atan2(ly-CY(),lx-CX());
  const delta=angle-lastDragAngle;
  spinVelocity=delta*0.8;
  rotOffset+=delta;
  lastDragAngle=angle;
});
window.addEventListener('mouseup',()=>{dragging=false;});

// ── Layout ────────────────────────────────────────────────────────
const GROUP_GAP=0.10;

function buildLayout(rot){
  const shortSide=Math.min(W(),H());
  const outerR=shortSide*0.40;
  const innerR=shortSide*0.245;
  const outerTotal=OUTER_GROUPS.reduce((a,g)=>a+g.nodes.length,0);
  const outerAvail=Math.PI*2-GROUP_GAP*OUTER_GROUPS.length;
  let cursor=rot-Math.PI/2-0.05;

  OUTER_GROUPS.forEach(g=>{
    const span=(g.nodes.length/outerTotal)*outerAvail;
    const step=span/g.nodes.length;
    g.startAngle=cursor; g.endAngle=cursor+span;
    g.nodes.forEach((n,i)=>{
      n.angle=cursor+step*(i+0.5);
      n.x=CX()+Math.cos(n.angle)*outerR;
      n.y=CY()+Math.sin(n.angle)*outerR;
      n.R=outerR;
    });
    cursor+=span+GROUP_GAP;
  });

  const innerTotal=INNER_GROUPS.reduce((a,g)=>a+g.nodes.length,0);
  const innerAvail=Math.PI*2-GROUP_GAP*INNER_GROUPS.length;
  cursor=rot-Math.PI/2+0.15;

  INNER_GROUPS.forEach(g=>{
    const span=(g.nodes.length/innerTotal)*innerAvail;
    const step=span/g.nodes.length;
    g.startAngle=cursor; g.endAngle=cursor+span;
    g.nodes.forEach((n,i)=>{
      n.angle=cursor+step*(i+0.5);
      n.x=CX()+Math.cos(n.angle)*innerR;
      n.y=CY()+Math.sin(n.angle)*innerR;
      n.R=innerR;
    });
    cursor+=span+GROUP_GAP;
  });
}

// ── Draw helpers ──────────────────────────────────────────────────
function drawArcBand(startA,endA,R,color,label,isInner){
  const thick=isInner?7:11;
  ctx.beginPath();ctx.arc(CX(),CY(),R+thick/2,startA,endA);
  ctx.strokeStyle=color;ctx.lineWidth=thick;ctx.globalAlpha=isInner?0.12:0.15;ctx.stroke();ctx.globalAlpha=1;
  ctx.beginPath();ctx.arc(CX(),CY(),R+thick,startA,endA);
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=0.6;ctx.stroke();ctx.globalAlpha=1;
  const midA=(startA+endA)/2;
  const lr=R+thick+20;
  const lx=CX()+Math.cos(midA)*lr, ly=CY()+Math.sin(midA)*lr;
  ctx.save();ctx.translate(lx,ly);
  let rot2=midA+Math.PI/2;
  if(midA>Math.PI/2&&midA<Math.PI*1.5)rot2+=Math.PI;
  ctx.rotate(rot2);
  ctx.font=`bold ${isInner?8:9}px ui-monospace,monospace`;
  ctx.fillStyle=color;ctx.globalAlpha=0.75;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,0,0);ctx.restore();
}

function drawChord(a,b,w,col,alpha,pulse){
  const ax=a.x,ay=a.y,bx=b.x,by=b.y;
  const pull=a.ring==='inner'&&b.ring==='inner'?0.5:0.3;
  const cpx=CX()+(ax+bx)/2*pull-CX()*pull;
  const cpy=CY()+(ay+by)/2*pull-CY()*pull;
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.quadraticCurveTo(cpx,cpy,bx,by);
  ctx.strokeStyle=col;ctx.lineWidth=w*1.5;ctx.globalAlpha=alpha;ctx.stroke();ctx.globalAlpha=1;
  const pt=pulse.t, fade=Math.sin(pt*Math.PI);
  const qx=(1-pt)*(1-pt)*ax+2*(1-pt)*pt*cpx+pt*pt*bx;
  const qy=(1-pt)*(1-pt)*ay+2*(1-pt)*pt*cpy+pt*pt*by;
  ctx.beginPath();ctx.arc(qx,qy,2.2,0,Math.PI*2);
  ctx.fillStyle=col;ctx.globalAlpha=fade*0.9;ctx.fill();ctx.globalAlpha=1;
}

function drawNode(n,isHover,t){
  const color=PAL[n.ck]||'#333';
  const r=3+(n.size||1)*1.8+(isHover?2.5:0);
  const breathe=0.5+0.5*Math.sin(t*0.65+n.angle*4);
  if(isHover){
    ctx.beginPath();ctx.arc(n.x,n.y,r+6,0,Math.PI*2);
    ctx.fillStyle=hexA(color,0.1);ctx.fill();
  }
  ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=isHover?2:1.5;
  ctx.globalAlpha=0.88+breathe*0.12;ctx.stroke();ctx.globalAlpha=1;
  if(n.size>=2){
    ctx.beginPath();ctx.arc(n.x,n.y,r*0.42,0,Math.PI*2);
    ctx.fillStyle=color;ctx.globalAlpha=0.65;ctx.fill();ctx.globalAlpha=1;
  }
  const isOuter=n.ring==='outer';
  const lx=CX()+Math.cos(n.angle)*(n.R+(isOuter?22:20));
  const ly=CY()+Math.sin(n.angle)*(n.R+(isOuter?22:20));
  ctx.save();ctx.translate(lx,ly);
  let rot=n.angle+Math.PI/2;
  if(n.angle>Math.PI/2&&n.angle<Math.PI*1.5)rot+=Math.PI;
  ctx.rotate(rot);
  const fs=isOuter?(n.size>=2?11:9.5):9;
  ctx.font=`${n.size>=2?'600':'400'} ${fs}px ui-monospace,SFMono-Regular,monospace`;
  ctx.fillStyle=isHover?color:'#1a1a1a';
  ctx.globalAlpha=isHover?1:(n.size>=2?0.82:0.58);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(n.label,0,0);ctx.restore();
}

function drawConnector(n){
  const outerR=Math.min(W(),H())*0.40;
  const tx=CX()+Math.cos(n.angle)*outerR*0.72;
  const ty=CY()+Math.sin(n.angle)*outerR*0.72;
  ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(tx,ty);
  ctx.strokeStyle='#ccc';ctx.lineWidth=0.5;
  ctx.setLineDash([2,5]);ctx.globalAlpha=0.35;ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;
}

function drawRoot(t,rootHover){
  const shortSide=Math.min(W(),H());
  const r=shortSide*0.075;
  const breathe=0.5+0.5*Math.sin(t*0.5);
  for(let i=4;i>=1;i--){
    ctx.beginPath();ctx.arc(CX(),CY(),r*(i/2.8),0,Math.PI*2);
    ctx.strokeStyle=PAL.root;ctx.lineWidth=rootHover?1:0.6;
    ctx.globalAlpha=0.06+i*0.05+breathe*0.02+(rootHover?0.06:0);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.beginPath();ctx.arc(CX(),CY(),Math.min(W(),H())*0.245*0.58,0,Math.PI*2);
  ctx.strokeStyle='#ddd';ctx.lineWidth=0.5;ctx.setLineDash([3,8]);ctx.globalAlpha=0.5;ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;
  ctx.beginPath();ctx.arc(CX(),CY(),r*0.75,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle=PAL.root;ctx.lineWidth=rootHover?2:1.5;
  ctx.globalAlpha=rootHover?1:0.85;ctx.stroke();ctx.globalAlpha=1;
  ctx.font=`bold 12px ui-monospace,monospace`;
  ctx.fillStyle=PAL.root;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.globalAlpha=rootHover?1:0.85;
  ctx.fillText('DESIGNER',CX(),CY()-8);
  ctx.fillText('PUNK',CX(),CY()+8);
  ctx.globalAlpha=1;
  if(rootHover){
    ctx.font=`400 8px ui-monospace,monospace`;
    ctx.fillStyle='#aaa';ctx.textAlign='center';
    ctx.fillText('drag to rotate',CX(),CY()+r*0.75+11);
  }
  canvas.style.cursor=rootHover?'grab':(dragging?'grabbing':'default');
  return r*0.75;
}

let lastT=0;

function frame(ts){
  const t=ts/1000;
  const dt=Math.min(t-lastT,0.05);
  lastT=t;

  pulses.forEach(p=>{p.t+=p.speed;if(p.t>1)p.t=0;});

  // ── Hover detection (pre-draw, use last frame positions) ──────
  const allNodes=[
    ...OUTER_GROUPS.flatMap(g=>g.nodes),
    ...INNER_GROUPS.flatMap(g=>g.nodes)
  ];

  let nodeUnderMouse=null;
  allNodes.forEach(n=>{
    if(!n.x)return;
    if(Math.hypot(mx-n.x,my-n.y)<16) nodeUnderMouse=n;
  });

  // ── Speed control ─────────────────────────────────────────────
  // hoverFade: 0 = full speed, 1 = fully stopped
  if(nodeUnderMouse){
    // Ease hoverFade toward 1 (decelerate)
    hoverFade=lerp(hoverFade,1,HOVER_DECEL);
  } else {
    // Ease hoverFade back toward 0 (resume)
    hoverFade=lerp(hoverFade,0,RESUME_ACCEL);
  }

  // Apply fade to the effective rotation speed
  if(!dragging){
    // Spin velocity decays to idle, then idle speed is scaled by (1-hoverFade)
    spinVelocity=lerp(spinVelocity,IDLE_SPEED,0.04);
    const effectiveSpeed=spinVelocity*(1-hoverFade);
    rotOffset+=effectiveSpeed;
  } else {
    // While dragging, don't apply hover fade
    spinVelocity*=0.9;
    hoverFade=0;
  }

  buildLayout(rotOffset);

  // Detect after layout for accurate positions
  hoveredNode=null;
  allNodes.forEach(n=>{
    if(!n.x)return;
    if(Math.hypot(mx-n.x,my-n.y)<16) hoveredNode=n;
  });

  const rootR=Math.min(W(),H())*0.075*0.75;
  const rootHover=Math.hypot(mx-CX(),my-CY())<rootR+8;

  ctx.clearRect(0,0,W(),H());
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W(),H());

  // Arc bands
  OUTER_GROUPS.forEach(g=>drawArcBand(g.startAngle,g.endAngle,
    OUTER_GROUPS[0].nodes[0].R||Math.min(W(),H())*0.40,g.color,g.label,false));
  INNER_GROUPS.forEach(g=>drawArcBand(g.startAngle,g.endAngle,
    INNER_GROUPS[0].nodes[0].R||Math.min(W(),H())*0.245,g.color,g.label,true));

  // Inner connectors
  INNER_GROUPS.forEach(g=>g.nodes.forEach(n=>n.x&&drawConnector(n)));

  // Chords
  CONNECTIONS.forEach(([aid,bid,w],i)=>{
    const a=nodeMap[aid],b=nodeMap[bid];
    if(!a?.x||!b?.x)return;
    const col=PAL[a.ck]||'#333';
    const active=hoveredNode&&(hoveredNode.id===aid||hoveredNode.id===bid);
    drawChord(a,b,w,col,active?0.62:0.10,pulses[i]);
  });

  // Nodes
  allNodes.forEach(n=>{
    if(!n.x)return;
    drawNode(n,hoveredNode&&hoveredNode.id===n.id,t);
  });

  // Root
  drawRoot(t,rootHover);

  // Tooltip — only show when nearly stopped
  if(hoveredNode&&hoverFade>0.6){
    tip.style.display='block';
    const col=PAL[hoveredNode.ck]||'#333';
    tip.style.borderColor=col;
    tip.innerHTML=`<span style="font-weight:bold;color:${col};">${hoveredNode.label}</span><br>${hoveredNode.desc}`;
  }else{
    tip.style.display='none';
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
